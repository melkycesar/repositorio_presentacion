
<!DOCTYPE html>
<html lang="es">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nortica | Signature Builder</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --nortica-blue: #1698D5;
            --bg-body: #F1F5F9;
            --text-dark: #1E293B;
            --border-ui: #E2E8F0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
        }

        .ui-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid var(--border-ui);
        }

        .input-label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .input-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            background: #F8FAFC;
        }

        .input-control:focus {
            border-color: var(--nortica-blue);
            background: white;
            box-shadow: 0 0 0 3px rgba(22, 152, 213, 0.1);
        }

        .btn-copy {
            background-color: #1a1a1a;
            color: white;
            font-weight: 700;
            padding: 16px 32px;
            border-radius: 14px;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }

        .btn-copy:hover {
            background-color: #333;
            transform: translateY(-2px);
        }

        #sig-render-canvas {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #F1F5F9;
            overflow-x: auto;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1698D5;
            color: white;
            padding: 12px 24px;
            border-radius: 99px;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(22, 152, 213, 0.3);
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Signature = ({ data }) => {
            return (
                <table cellpadding="0" cellspacing="0" border="0" width="100%" style={{ maxWidth: "600px", fontFamily: "'Inter', Arial, sans-serif", color: "#333333", backgroundColor: "#ffffff" }}>
                    <tr>
                        <td style={{ paddingBottom: "12px" }}>
                            <table cellpadding="0" cellspacing="0" border="0" width="100%">
                                <tr>
                                    <td style={{ fontFamily: "'Montserrat', Arial, sans-serif", fontSize: "28px", fontWeight: "700", color: "#1698D5", letterSpacing: "-0.5px" }}>
                                        {data.name || 'Alvaro Castillo'}
                                    </td>
                                    <td align="right" valign="middle" style={{ whiteSpace: "nowrap" }}>
                                        <a href="#" style={{ textDecoration: "none", marginLeft: "12px" }}><img src="https://img.icons8.com/ios-filled/50/1a1a1a/facebook-f.png" width="20" height="20" alt="Facebook" style={{ display: "inline-block", verticalAlign: "middle" }} /></a>
                                        <a href="#" style={{ textDecoration: "none", marginLeft: "12px" }}><img src="https://img.icons8.com/ios-filled/50/1a1a1a/linkedin.png" width="20" height="20" alt="LinkedIn" style={{ display: "inline-block", verticalAlign: "middle" }} /></a>
                                        <a href="#" style={{ textDecoration: "none", marginLeft: "12px" }}><img src="https://img.icons8.com/ios-filled/50/1a1a1a/instagram-new.png" width="20" height="20" alt="Instagram" style={{ display: "inline-block", verticalAlign: "middle" }} /></a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <tr>
                        <td style={{ borderTop: "1px solid #1a1a1a", paddingTop: "15px", paddingBottom: "15px" }}></td>
                    </tr>

                    <tr>
                        <td style={{ paddingBottom: "20px" }}>
                            <table cellpadding="0" cellspacing="0" border="0" width="100%">
                                <tr>
                                    <td width="40%" valign="top" style={{ paddingRight: "15px" }}>
                                        <div style={{ fontFamily: "'Inter', Arial, sans-serif", fontSize: "14px", color: "#444444", marginBottom: "4px" }}>{data.position || 'Gerente de Ventas'}</div>
                                        <div style={{ fontFamily: "'Montserrat', Arial, sans-serif", fontSize: "14px", fontWeight: "600", color: "#1a1a1a", marginBottom: "20px" }}>Nortica Systems</div>
                                        <div><a href="https://www.nortica.do" style={{ fontFamily: "'Montserrat', Arial, sans-serif", fontSize: "13px", fontWeight: "600", color: "#00AEEF", textDecoration: "none" }}>www.nortica.do</a></div>
                                    </td>
                                    <td width="60%" valign="top">
                                        <table cellpadding="0" cellspacing="0" border="0" width="100%" style={{ fontSize: "13px", lineHeight: "1.6" }}>
                                            <tr>
                                                <td width="80" valign="top" style={{ fontFamily: "'Montserrat', Arial, sans-serif", fontWeight: "600", color: "#1a1a1a" }}>Correo:</td>
                                                <td valign="top"><a href={`mailto:${data.email || 'alvaro.castillo@nortica.do'}`} style={{ fontFamily: "'Inter', Arial, sans-serif", color: "#00AEEF", textDecoration: "none" }}>{data.email || 'alvaro.castillo@nortica.do'}</a></td>
                                            </tr>
                                            <tr>
                                                <td valign="top" style={{ fontFamily: "'Montserrat', Arial, sans-serif", fontWeight: "600", color: "#1a1a1a" }}>Móvil:</td>
                                                <td valign="top" style={{ fontFamily: "'Inter', Arial, sans-serif", color: "#555555" }}>{data.mobile || '+1 (829) 761-4242'}</td>
                                            </tr>
                                            <tr>
                                                <td valign="top" style={{ fontFamily: "'Montserrat', Arial, sans-serif", fontWeight: "600", color: "#1a1a1a" }}>Teléfono:</td>
                                                <td valign="top" style={{ fontFamily: "'Inter', Arial, sans-serif", color: "#555555" }}>{data.phone || '+1 (809) 533-4242'}</td>
                                            </tr>
                                            <tr>
                                                <td valign="top" style={{ fontFamily: "'Montserrat', Arial, sans-serif", fontWeight: "600", color: "#1a1a1a" }}>Dirección:</td>
                                                <td valign="top" style={{ fontFamily: "'Inter', Arial, sans-serif", color: "#555555" }}>{data.address || 'Calle Andrés Brugal No. 19, Ensanche Luperón, Puerto Plata, Rep. Dom.'}</td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <tr>
                        <td style={{ paddingBottom: "15px" }}>
                            <img src="https://ikoncd.com/nortica/images/img_signature.png" alt="Banner Nortica Systems" width="600" style={{ display: "block", width: "100%", maxWidth: "600px", height: "auto", borderRadius: "8px" }} />
                        </td>
                    </tr>

                    <tr>
                        <td style={{ fontFamily: "'Inter', Arial, sans-serif", fontSize: "10px", color: "#777777", lineHeight: "1.4", textAlign: "justify" }}>
                            <strong>AVISO DE CONFIDENCIALIDAD:</strong> Este mensaje y sus archivos adjuntos van dirigidos exclusivamente a su destinatario. Contiene información confidencial sometida a secreto profesional cuya divulgación está prohibida por la ley. Si usted no es el destinatario, queda notificado de que cualquier divulgación, copia o distribución está estrictamente prohibida.
                        </td>
                    </tr>
                </table>
            );
        };

        const App = () => {
            const [formData, setFormData] = useState({
                name: 'Alvaro Castillo',
                position: 'Gerente de Ventas',
                email: 'alvaro.castillo@nortica.do',
                mobile: '+1 (829) 761-4242',
                phone: '+1 (809) 533-4242',
                address: 'Calle Andrés Brugal No. 19, Ensanche Luperón, Puerto Plata, Rep. Dom.'
            });

            const [toast, setToast] = useState('');

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleCopy = () => {
                const html = document.getElementById('sig-html').innerHTML;
                const blob = new Blob([html], { type: 'text/html' });
                const text = new Blob([html], { type: 'text/plain' });
                const item = new ClipboardItem({ 'text/html': blob, 'text/plain': text });
                navigator.clipboard.write([item]).then(() => {
                    setToast('¡Firma copiada!');
                    setTimeout(() => setToast(''), 3000);
                });
            };

            return (
                <div className="max-w-7xl mx-auto px-6 py-12">
                    <div className="flex justify-between items-center mb-12">
                        <div>
                            <h1 className="text-3xl font-black font-montserrat tracking-tight text-[#1698D5]">Nortica | <span className="text-slate-900">Sign Builder</span></h1>
                            <p className="text-slate-500 font-medium">Herramienta de generación de firmas corporativas</p>
                        </div>
                        <img src="https://ikoncd.com/nortica/images/logo_default.png" alt="Nortica" className="h-10" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                        {/* EDITOR */}
                        <div className="lg:col-span-5 space-y-6">
                            <div className="ui-card p-8">
                                <h2 className="font-montserrat font-bold text-xs uppercase tracking-widest text-slate-400 mb-8 flex items-center gap-2">
                                    <span className="w-1.5 h-1.5 rounded-full bg-[#1698D5]"></span> 01. Información Personal
                                </h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="input-label">Nombre Completo</label>
                                        <input type="text" name="name" value={formData.name} onChange={handleChange} className="input-control" />
                                    </div>
                                    <div>
                                        <label className="input-label">Cargo / Puesto</label>
                                        <input type="text" name="position" value={formData.position} onChange={handleChange} className="input-control" />
                                    </div>
                                    <div>
                                        <label className="input-label">Email Corporativo</label>
                                        <input type="email" name="email" value={formData.email} onChange={handleChange} className="input-control" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="input-label">Móvil</label>
                                            <input type="text" name="mobile" value={formData.mobile} onChange={handleChange} className="input-control" />
                                        </div>
                                        <div>
                                            <label className="input-label">Teléfono</label>
                                            <input type="text" name="phone" value={formData.phone} onChange={handleChange} className="input-control" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="input-label">Dirección Oficina</label>
                                        <textarea name="address" value={formData.address} onChange={handleChange} className="input-control h-24 resize-none" />
                                    </div>
                                </div>
                            </div>

                            <div className="bg-slate-900 p-8 rounded-[20px] text-white">
                                <h3 className="font-montserrat font-bold text-xs uppercase tracking-widest text-[#1698D5] mb-4">Instrucciones</h3>
                                <p className="text-xs text-slate-400 leading-relaxed">
                                    Haz clic en el botón negro <span className="text-white font-bold">COPIAR FIRMA</span> y pégala directamente en la configuración de firmas de Outlook, Gmail o el cliente que utilices.
                                </p>
                            </div>
                        </div>

                        {/* PREVIEW */}
                        <div className="lg:col-span-7">
                            <div className="ui-card p-8 h-full flex flex-col">
                                <h2 className="font-montserrat font-bold text-xs uppercase tracking-widest text-slate-400 mb-8 flex items-center gap-2">
                                    <span className="w-1.5 h-1.5 rounded-full bg-[#1698D5]"></span> 02. Previsualización
                                </h2>
                                
                                <div id="sig-render-canvas" className="flex-grow flex items-center justify-center">
                                    <div id="sig-html">
                                        <Signature data={formData} />
                                    </div>
                                </div>

                                <div className="mt-8">
                                    <button onClick={handleCopy} className="btn-copy w-full flex items-center justify-center gap-3">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                                        COPIAR FIRMA
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <footer className="mt-20 text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                        &copy; 2026 Nortica Systems &bull; Puerto Plata, Rep. Dom.
                    </footer>

                    {toast && <div className="toast animate-bounce">{toast}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
